<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="口袋防线" />
  <meta name="theme-color" content="#07111f" />
  <link rel="manifest" href="./manifest.json?v=20260529-fullscreen-v1" />
  <title>口袋防线：背包塔防 Demo</title>
  <link rel="stylesheet" href="./styles.css?v=20260529-fullscreen-v1" />
</head>
<body>
  <main class="shell">
    <div class="rotate-tip" aria-hidden="true">请横屏游玩</div>
    <header class="topbar compact-topbar">
      <div class="title-wrap">
        <div id="titleRunner" class="title-runner" aria-hidden="true"></div>
        <img class="game-title-logo" src="./assets/ui/title/game_title_logo.webp?v=20260529-portal-both-fixed-v26" alt="口袋防线" />
        <button id="helpBtn" class="help-button" type="button" aria-label="玩法说明">?</button>
      </div>
    </header>

    <dialog id="helpDialog" class="help-dialog">
      <form method="dialog" class="help-modal">
        <button class="dialog-close" value="close" aria-label="关闭">×</button>
        <h2>玩法说明</h2>
        <p>从底部道具栏拖拽塔到地图放置 → 同类同级拖放合成，或点击塔用菜单升级/出售 → 开始波次后锁定部署。</p>
        <ul>
          <li>道具栏：把底部防御塔图标直接拖到地图空地建造。</li>
          <li>地图：准备阶段可自由拖拽部署塔，同类同级可合成，不能压道路或重叠。</li>
          <li>战斗：开始波次后部署锁定。</li>
        </ul>
      </form>
    </dialog>

    <section class="game-card">
      <div class="battlefield">
        <button id="fullscreenBtn" class="fullscreen-button" type="button" aria-label="全屏">⛶</button>
        <canvas id="game" width="1280" height="720"></canvas>
        <div id="hud" class="hud"></div>
        <div id="levelSelectPanel" class="level-select-panel is-hidden">
          <span>关卡</span>
          <select id="levelSelect" aria-label="选择关卡"></select>
        </div>
        <div id="shopCancelZone" class="shop-cancel-zone" aria-hidden="true">拖回商店取消放置</div>
        <button id="startWaveBtn" class="primary start-wave-float game-art-button button-next-wave">开始下一波</button>
        <button id="restartBtn" class="primary restart-float game-art-button button-restart" hidden>重玩关卡</button>

        <section class="command-deck">
          <section class="shop-strip" aria-label="建造道具栏">
            <div id="shop" class="shop"></div>
          </section>
        </section>
        <div id="goldHud" class="gold-hud" role="button" tabindex="0" aria-label="当前金币，快速点击三次显示或隐藏关卡选择"></div>
        <div id="towerActionMenu" class="tower-action-menu" hidden></div>
      </div>
    </section>
  </main>

  <script src="./game.js?v=20260529-fullscreen-v1"></script>
</body>
</html>
